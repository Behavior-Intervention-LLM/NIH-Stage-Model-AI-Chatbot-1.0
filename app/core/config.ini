[NCBI]
search_url = https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi
fetch_url = https://eutils.ncbi.nlm.nih.gov/entrez/eutils/efetch.fcgi
sleep = 0.4
search_limit_per_query = 150

[S3]
base_url = https://pmc-oa-opendata.s3.amazonaws.com
sleep = 0.3

[CHUNKING]
chunk_size = 700
chunk_overlap = 150

[EMBEDDING]
model = mixedbread-ai/mxbai-embed-large-v1
dim = 1024
batch_size = 64

[QUERIES]
primary = (
        "NIH Stage Model"[tiab] OR
        "Rounsaville stage model"[tiab] OR
        "stage model of behavioral intervention"[tiab] OR
        "stage model of intervention development"[tiab]
    ) AND (
        open_access[filter] OR author_manuscript[filter]
    )

case_study = (
    (
        "NIH Stage Model"[tiab] OR
        "Rounsaville stage model"[tiab]
    ) AND (
        "Stage IA"[tiab] OR "Stage IB"[tiab] OR
        "Stage II"[tiab] OR "Stage III"[tiab] OR
        "Stage IV"[tiab] OR "Stage V"[tiab] OR
        "feasibility"[tiab] OR "efficacy trial"[tiab] OR
        "pilot"[tiab]
    )
    ) AND (
        open_access[filter] OR author_manuscript[filter]
    )