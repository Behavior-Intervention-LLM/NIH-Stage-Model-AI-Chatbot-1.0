[NCBI]
search_url = https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi
fetch_url = https://eutils.ncbi.nlm.nih.gov/entrez/eutils/efetch.fcgi
sleep = 0.4
search_limit_per_query = 200

[S3]
base_url = https://pmc-oa-opendata.s3.amazonaws.com
sleep = 0.3

[CHUNKING]
chunk_size = 400
chunk_overlap = 50

[EMBEDDING]
model = BAAI/bge-base-en-v1.5
dim = 768
batch_size = 32

[QDRANT]
host = localhost
port = 6333

[QUERIES]
primary = (
    "NIH Stage Model"[tw] OR
    "stage model of behavioral intervention"[tw] OR
    "Rounsaville"[tw] OR
    "behavioral intervention development stages"[tw] OR
    "Stage 0 intervention"[tw] OR
    "Stage 1 intervention development"[tw]
    ) AND (
    open_access[filter] OR author_manuscript[filter]
    )

case_study = (
    "pilot feasibility"[tw] OR
    "Stage I feasibility"[tw] OR
    "Stage II efficacy trial"[tw] OR
    "Stage III effectiveness"[tw] OR
    "intervention development framework"[tw]
    ) AND (
    "NIH Stage"[tw] OR
    "behavioral intervention"[tw]
    ) AND (
    open_access[filter] OR author_manuscript[filter]
    )