[NCBI]
search_url = https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi
fetch_url = https://eutils.ncbi.nlm.nih.gov/entrez/eutils/efetch.fcgi
sleep = 0.4
search_limit_per_query = 1000

[S3]
base_url = https://pmc-oa-opendata.s3.amazonaws.com
sleep = 0.3

[CHUNKING]
chunk_size = 400
chunk_overlap = 50

[EMBEDDING]
model = mixedbread-ai/mxbai-embed-large-v1
dim = 1024
batch_size = 64

[QUERIES]
primary = (
    ("NIH Stage Model"[tw] OR "Rounsaville stage model"[tw]) AND
    ("behavioral intervention"[tw] OR "intervention development"[tw])
    ) OR
    (
    "stage model"[tw] AND "behavioral intervention development"[tw]
    ) AND (
    open_access[filter] OR author_manuscript[filter]
    ) NOT (
    "pharmacology"[tw] OR
    "drug"[tw] OR
    "medication"[tw] OR
    "genetic"[tw] OR
    "neuroscience"[tw]
    )

case_study = (
    (
        "intervention development"[tw] OR
        "intervention refinement"[tw] OR
        "behavior change technique"[tw] OR
        "proof-of-concept"[tw] OR
        "feasibility study"[tw]
    ) AND
    (
        "design logic"[tw] OR
        "mediation analysis"[tw] OR
        "mechanism measurement"[tw] OR
        "process evaluation"[tw] OR
        "implementation fidelity"[tw] OR
        "adaptive design"[tw] OR
        "SMART trial"[tw]
    ) AND
    (
        "randomized trial"[tw] OR
        "quasi-experimental"[tw] OR
        "pilot study"[tw]
    )
    ) AND (
    open_access[filter] OR author_manuscript[filter]
    ) AND (
    "behavioral"[tw] OR "behavioral health"[tw] OR "mental health"[tw]
    )